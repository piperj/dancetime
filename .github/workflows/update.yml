name: Update competition data

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      cyi:
        description: "Competition Year ID(s) to scrape, comma-separated (overrides schedule)"
        required: false
      force:
        description: Force re-download even if cached
        required: false
        default: "false"

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Check which competitions need updating
        id: check
        run: |
          MANUAL="${{ github.event.inputs.cyi }}"
          if [ -n "$MANUAL" ]; then
            CYIS=$(python3 -c "import json; print(json.dumps([int(c.strip()) for c in '$MANUAL'.split(',')]))")
          else
            CYIS=$(uv run python - <<'PYEOF'
          import json, sys
          from pathlib import Path
          from schedule.runner import due_cyis
          cyis = due_cyis(Path("data"))
          print(f"Due CYIs: {cyis}", file=sys.stderr)
          print(json.dumps(cyis))
          PYEOF
            )
          fi
          echo "cyis=$CYIS" >> $GITHUB_OUTPUT
          [ "$CYIS" = "[]" ] && echo "run=false" >> $GITHUB_OUTPUT || echo "run=true" >> $GITHUB_OUTPUT

      - name: Scrape, process and publish
        if: steps.check.outputs.run == 'true'
        run: |
          FORCE=""
          [ "${{ github.event.inputs.force }}" = "true" ] && FORCE="--force"
          CYIS=$(echo '${{ steps.check.outputs.cyis }}' | python3 -c "import sys, json; [print(c) for c in json.load(sys.stdin)]")
          for CYI in $CYIS; do
            uv run python dancetime_cli.py scrape --cyi $CYI $FORCE
            uv run python dancetime_cli.py heats --cyi $CYI
            uv run python dancetime_cli.py ranking --cyi $CYI
          done
          uv run python dancetime_cli.py publish

      - name: Commit and push if changed
        if: steps.check.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ index.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update comp data [skip ci]"
            git push
          fi
