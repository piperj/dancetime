<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dancetime</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f8f8f8; color: #222; }
    header { background: #1a1a2e; color: #fff; padding: 1rem 1.5rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
    header h1 { font-size: 1.4rem; flex: 1; }
    select { padding: .4rem .6rem; border-radius: 4px; border: none; font-size: .95rem; background: #fff; }
    nav { display: flex; gap: 0; border-bottom: 2px solid #ddd; background: #fff; }
    nav button { padding: .6rem 1.4rem; border: none; background: none; cursor: pointer; font-size: 1rem; color: #555; border-bottom: 3px solid transparent; margin-bottom: -2px; }
    nav button.active { color: #1a1a2e; border-bottom-color: #1a1a2e; font-weight: 600; }
    .search-bar { padding: .75rem 1.5rem; background: #fff; border-bottom: 1px solid #eee; display: flex; gap: .5rem; flex-wrap: wrap; }
    .search-bar input { flex: 1; min-width: 180px; padding: .4rem .7rem; border: 1px solid #ccc; border-radius: 4px; font-size: .95rem; }
    .search-bar select { min-width: 140px; border: 1px solid #ccc; background: #fff; color: #333; }
    main { padding: 1rem 1.5rem; }
    .heat-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 6px; margin-bottom: .6rem; overflow: hidden; }
    .heat-header { display: flex; align-items: center; gap: .75rem; padding: .6rem 1rem; cursor: pointer; user-select: none; }
    .heat-header:hover { background: #f5f5f5; }
    .heat-num { font-weight: 700; font-size: 1rem; min-width: 2.5rem; }
    .heat-info { flex: 1; font-size: .9rem; color: #555; }
    .heat-session { font-size: .8rem; background: #e8e8f0; padding: .15rem .5rem; border-radius: 10px; color: #444; }
    .heat-entries { display: none; border-top: 1px solid #eee; }
    .heat-entries.open { display: block; }
    .entry-row { display: flex; align-items: center; gap: .75rem; padding: .5rem 1rem; border-bottom: 1px solid #f0f0f0; font-size: .9rem; }
    .entry-row:last-child { border-bottom: none; }
    .entry-place { min-width: 1.8rem; font-weight: 700; color: #888; }
    .entry-place.p1 { color: #c9a227; }
    .entry-place.p2 { color: #888; }
    .entry-place.p3 { color: #a0522d; }
    .entry-couple { flex: 1; }
    .entry-bib { font-size: .8rem; color: #aaa; }
    .entry-studio { font-size: .8rem; color: #888; font-style: italic; }
    .lb-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 6px; overflow: hidden; border: 1px solid #e0e0e0; }
    .lb-table th { text-align: left; padding: .6rem 1rem; background: #1a1a2e; color: #fff; font-size: .85rem; }
    .lb-table td { padding: .55rem 1rem; border-bottom: 1px solid #eee; font-size: .9rem; }
    .lb-table tr:last-child td { border-bottom: none; }
    .lb-table tr:hover td { background: #f8f8f8; }
    .lb-section { margin-bottom: 2rem; }
    .lb-section h2 { font-size: 1.1rem; margin-bottom: .6rem; color: #1a1a2e; }
    .delta-pos { color: #2e7d32; }
    .delta-neg { color: #c62828; }
    .hidden { display: none; }
    #status { text-align: center; padding: 3rem; color: #888; font-size: 1.1rem; }
  </style>
</head>
<body>

<header>
  <h1>Dancetime</h1>
  <select id="comp-select"><option value="">Loading competitions…</option></select>
</header>

<nav>
  <button class="active" data-tab="heats">Heats</button>
  <button data-tab="ranking">Ranking</button>
</nav>

<div class="search-bar" id="heats-controls">
  <input type="search" id="search-competitor" placeholder="Search competitor…" />
  <select id="filter-session"><option value="">All sessions</option></select>
</div>

<main>
  <div id="status">Select a competition to begin.</div>
  <div id="heats-view" class="hidden"></div>
  <div id="ranking-view" class="hidden"></div>
</main>

<script>
  const compSelect = document.getElementById('comp-select');
  const searchInput = document.getElementById('search-competitor');
  const sessionFilter = document.getElementById('filter-session');
  const heatsView = document.getElementById('heats-view');
  const rankingView = document.getElementById('ranking-view');
  const status = document.getElementById('status');
  const heatsControls = document.getElementById('heats-controls');

  let activeTab = 'heats';
  let heatsData = null;
  let rankingData = null;

  // Tab switching
  document.querySelectorAll('nav button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeTab = btn.dataset.tab;
      heatsControls.style.display = activeTab === 'heats' ? 'flex' : 'none';
      renderActive();
    });
  });

  // Load index
  fetch('data/index.json')
    .then(r => r.json())
    .then(index => {
      compSelect.innerHTML = '';
      if (!index.competitions.length) {
        compSelect.innerHTML = '<option>No competitions available</option>';
        return;
      }
      index.competitions.forEach((comp, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = `${comp.name} — ${comp.date_range}`;
        opt.dataset.heats = comp.heats_file;
        opt.dataset.ranking = comp.ranking_file;
        compSelect.appendChild(opt);
      });
      loadComp(index.competitions[0]);
    })
    .catch(() => { status.textContent = 'Could not load competition index.'; });

  compSelect.addEventListener('change', () => {
    const opt = compSelect.selectedOptions[0];
    if (!opt) return;
    const idx = index_competitions[parseInt(opt.value)];
    loadComp({ heats_file: opt.dataset.heats, ranking_file: opt.dataset.ranking });
  });

  function loadComp(comp) {
    heatsData = null;
    rankingData = null;
    heatsView.innerHTML = '';
    rankingView.innerHTML = '';
    status.textContent = 'Loading…';
    status.classList.remove('hidden');

    Promise.all([fetch(comp.heats_file), fetch(comp.ranking_file)])
      .then(([hr, rr]) => Promise.all([hr.json(), rr.json()]))
      .then(([h, r]) => {
        heatsData = h;
        rankingData = r;
        _populateSessionFilter(h);
        status.classList.add('hidden');
        renderActive();
      })
      .catch(e => { status.textContent = `Error loading data: ${e.message}`; });
  }

  function _populateSessionFilter(h) {
    sessionFilter.innerHTML = '<option value="">All sessions</option>';
    Object.entries(h.sessions || {}).forEach(([id, name]) => {
      const opt = document.createElement('option');
      opt.value = id;
      opt.textContent = name;
      sessionFilter.appendChild(opt);
    });
  }

  searchInput.addEventListener('input', renderHeats);
  sessionFilter.addEventListener('change', renderHeats);

  function renderActive() {
    if (activeTab === 'heats') {
      rankingView.classList.add('hidden');
      heatsView.classList.remove('hidden');
      renderHeats();
    } else {
      heatsView.classList.add('hidden');
      rankingView.classList.remove('hidden');
      renderRanking();
    }
  }

  function renderHeats() {
    if (!heatsData) return;
    const query = searchInput.value.toLowerCase().trim();
    const session = sessionFilter.value;

    const filtered = heatsData.heats.filter(h => {
      if (session && h.session !== session) return false;
      if (!query) return true;
      return h.entries.some(e =>
        e.couple.toLowerCase().includes(query) ||
        e.studio.toLowerCase().includes(query)
      );
    });

    heatsView.innerHTML = filtered.length
      ? filtered.map(renderHeatCard).join('')
      : '<p style="color:#888;padding:1rem">No heats match your search.</p>';

    heatsView.querySelectorAll('.heat-header').forEach(hdr => {
      hdr.addEventListener('click', () => {
        hdr.nextElementSibling.classList.toggle('open');
      });
    });
  }

  function renderHeatCard(h) {
    const entries = h.entries.map(e => {
      const placeClass = e.result === '1' ? 'p1' : e.result === '2' ? 'p2' : e.result === '3' ? 'p3' : '';
      return `<div class="entry-row">
        <span class="entry-place ${placeClass}">${e.result || '—'}</span>
        <span class="entry-couple">${esc(e.couple)}</span>
        <span class="entry-bib">#${esc(e.bib)}</span>
        <span class="entry-studio">${esc(e.studio)}</span>
      </div>`;
    }).join('');

    return `<div class="heat-card">
      <div class="heat-header">
        <span class="heat-num">${esc(h.heat_number)}</span>
        <span class="heat-info">${esc(h.entries[0]?.event || '')} · ${esc(h.round)}</span>
        <span class="heat-session">${esc(h.session_name)}</span>
      </div>
      <div class="heat-entries">${entries}</div>
    </div>`;
  }

  function renderRanking() {
    if (!rankingData) return;
    const sections = Object.values(rankingData.leaderboards)
      .filter(lb => lb.couples.length)
      .sort((a, b) => a.label.localeCompare(b.label));

    rankingView.innerHTML = sections.map(lb => {
      const rows = lb.couples.map(c => {
        const deltaClass = c.elo_delta.startsWith('+') ? 'delta-pos' : c.elo_delta.startsWith('-') ? 'delta-neg' : '';
        return `<tr>
          <td>${c.rank}</td>
          <td>${esc(c.competitor)}${c.partner ? ' &amp; ' + esc(c.partner) : ''}</td>
          <td>${esc(c.studio)}</td>
          <td>${c.elo.toFixed(1)}</td>
          <td class="${deltaClass}">${esc(c.elo_delta)}</td>
          <td>${c.heats_processed}</td>
        </tr>`;
      }).join('');

      return `<div class="lb-section">
        <h2>Leaderboard ${esc(lb.label)} <small style="font-weight:normal;color:#888">(${lb.size} couples)</small></h2>
        <table class="lb-table">
          <thead><tr><th>#</th><th>Couple</th><th>Studio</th><th>ELO</th><th>Δ</th><th>Heats</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
    }).join('');
  }

  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
